<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Basic -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/Photo.jpg" />
  <!-- preload Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">

  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
  </noscript>

  <!-- SEO -->
  <title>Yahia Abdelsalam | Software Developer</title>
  <meta name="description"
    content="Official portfolio of Yahia Abdelsalam, Software Developer. Focused on creating attractive digital experiences and delivering the best solutions in every project." />
  <meta name="keywords" content="Yahia Abdelsalam, Software Developer, Portfolio Yahia" />
  <meta name="author" content="Yahia Abdelsalam" />

  <!-- Theme / PWA -->
  <meta name="theme-color" content="#030014" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://my-portfolio-7f5t.vercel.app/" />
  <meta property="og:title" content="Yahia Abdelsalam | Software Developer" />
  <meta property="og:description" content="Official portfolio of Yahia Abdelsalam, Software Developer." />
  <meta property="og:image" content="https://my-portfolio-7f5t.vercel.app/Meta.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://my-portfolio-7f5t.vercel.app/" />
  <meta name="twitter:title" content="Yahia Abdelsalam | Software Developer" />
  <meta name="twitter:description" content="Official portfolio of Yahia Abdelsalam, Software Developer." />
  <meta name="twitter:image" content="https://my-portfolio-7f5t.vercel.app/Meta.png" />

  <!-- Canonical -->
  <link rel="canonical" href="https://my-portfolio-7f5t.vercel.app/" />

  <!-- Structured Data: Person -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Yahia Abdelsalam",
    "url": "https://my-portfolio-7f5t.vercel.app",
    "image": "https://my-portfolio-7f5t.vercel.app/Photo.jpg",
    "jobTitle": "Software Developer",
    "description": "Focused on creating attractive digital experiences and delivering the best solutions in every project.",
    "sameAs": [
      "https://www.linkedin.com/in/your-linkedin/",
      "https://github.com/your-github"
    ]
  }
  </script>
</head>

<body>
  <!-- Hidden SEO header -->
  <header style="display:none">
    <h1>Yahia Abdelsalam</h1>
    <p>
      Focused on creating attractive digital experiences and delivering the best solutions in every project.
    </p>
  </header>

  <!-- Root React -->
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
